services:

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER:     admin
      MINIO_ROOT_PASSWORD: secreto123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - red_infb6074

  python_app:
    build: .
    depends_on:
      - minio
    environment:
      MINIO_HOST:     minio
      MINIO_PORT:     "9000"
      MINIO_USER:     admin
      MINIO_PASSWORD: secreto123
    volumes:
      - .:/work
    networks:
      - red_infb6074

networks:
  red_infb6074:
    driver: bridge

volumes:
  minio_data: